name: Verify Deployment

on:
  push:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm Vercel deployment triggered
        run: |
          echo "Vercel Git integration handles deployment automatically."
          echo "Both production domains are configured as project domains and update on every push to master:"
          echo "  - rc-golf-sweeps.vercel.app"
          echo "  - rc-golf-sweeps-rosscoy95-9546-rosscoy95-9546s-projects.vercel.app"
          echo "No token or manual aliasing required."
