name: Alias production URL

on:
  push:
    branches: [master]

jobs:
  alias:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deployment then alias to rc-golf-sweeps.vercel.app
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          TEAM_ID: team_eacmJfhJqgPqg7phWGMGittC
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is empty or missing. Set it in repo Settings > Secrets and re-run."
            exit 1
          fi

          echo "Looking for deployment of commit $COMMIT_SHA..."
          DEPLOYMENT_URL=""

          for i in $(seq 1 30); do
            HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              "https://api.vercel.com/v6/deployments?teamId=$TEAM_ID&meta-githubCommitSha=$COMMIT_SHA&limit=5" \
              -H "Authorization: Bearer $VERCEL_TOKEN")
            RESPONSE=$(cat /tmp/response.json)

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "::error::Vercel API returned HTTP $HTTP_STATUS while listing deployments. Response: $RESPONSE"
              echo "This usually means VERCEL_TOKEN is invalid, expired, or lacks access to this team/project."
              exit 1
            fi

            if ! echo "$RESPONSE" | jq -e '.deployments' > /dev/null 2>&1; then
              echo "::error::Unexpected response shape from Vercel API (no .deployments field). Response: $RESPONSE"
              exit 1
            fi

            DEPLOYMENT_URL=$(echo "$RESPONSE" | jq -r \
              '.deployments[] | select(.state=="READY") | .url' | head -1)

            if [ -n "$DEPLOYMENT_URL" ]; then
              echo "Deployment ready: https://$DEPLOYMENT_URL"
              break
            fi

            STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state // "not found"')
            echo "Attempt $i: state=$STATE — waiting 10s..."
            sleep 10
          done

          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "::error::No READY deployment found for $COMMIT_SHA after 5 minutes. Production alias was NOT updated — rc-golf-sweeps.vercel.app is still on the previous build."
            exit 1
          fi

          echo "Aliasing https://$DEPLOYMENT_URL → rc-golf-sweeps.vercel.app ..."
          ALIAS_STATUS=$(curl -s -o /tmp/alias-response.json -w "%{http_code}" -X POST \
            "https://api.vercel.com/v2/deployments/$DEPLOYMENT_URL/aliases?teamId=$TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"alias":"rc-golf-sweeps.vercel.app"}')
          cat /tmp/alias-response.json | jq .

          if [ "$ALIAS_STATUS" -ge 400 ]; then
            echo "::error::Aliasing failed with HTTP $ALIAS_STATUS. Production alias was NOT updated."
            exit 1
          fi

          echo "Done."
