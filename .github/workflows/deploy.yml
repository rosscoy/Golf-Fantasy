name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel and assign production alias
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_eacmJfhJqgPqg7phWGMGittC
          VERCEL_PROJECT_ID: prj_oJ6imXwDf85UbMzzb38J7eFEswdn
        run: |
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel build --prod --token=$VERCEL_TOKEN
          DEPLOY_URL=$(npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "Deployed to: $DEPLOY_URL"
          npx vercel alias set $DEPLOY_URL rc-golf-sweeps.vercel.app --token=$VERCEL_TOKEN
